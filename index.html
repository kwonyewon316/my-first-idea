<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>응원 페이지</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-animation"></div>
    <div class="container">
        <div class="glass-card">
            <h1 id="main-title">오늘도 힘내세요!</h1>
            <p class="subtitle">새로운 시작을 향한 첫 걸음</p>
            <button id="next-btn" class="btn-next">다음 문장 보기</button>
        </div>
    </div>
    <script>
        const sentences = [
            '오늘도 힘내세요!',
            '오늘도 해냈어요!',
            '조금씩 나아지고 있어요.',
            '이대로 계속 가봅시다.'
        ];
        const btnStyles = [
            { bg: 'linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)', color: '#ffffff', shadow: 'rgba(37, 99, 235, 0.4)' },
            { bg: 'linear-gradient(135deg, #facc15 0%, #eab308 100%)', color: '#1e293b', shadow: 'rgba(234, 179, 8, 0.4)' },
            { bg: 'linear-gradient(135deg, #fb923c 0%, #f97316 100%)', color: '#ffffff', shadow: 'rgba(249, 115, 22, 0.4)' },
            { bg: 'linear-gradient(135deg, #4ade80 0%, #22c55e 100%)', color: '#ffffff', shadow: 'rgba(34, 197, 94, 0.4)' }
        ];

        let currentIndex = 0;
        const titleElement = document.getElementById('main-title');
        const btnElement = document.getElementById('next-btn');

        btnElement.addEventListener('click', () => {
            // Apply a quick fade effect
            titleElement.style.opacity = '0';
            titleElement.style.transform = 'translateY(-10px)';
            titleElement.style.transition = 'all 0.3s ease';

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % sentences.length;

                // Update text
                titleElement.textContent = sentences[currentIndex];
                titleElement.style.opacity = '1';
                titleElement.style.transform = 'translateY(0)';

                // Update button style
                const style = btnStyles[currentIndex];
                btnElement.style.background = style.bg;
                btnElement.style.color = style.color;
                btnElement.style.boxShadow = `0 10px 20px -5px ${style.shadow}`;
            }, 300);
        });
    </script>
</body>

</html>
